<!doctype html>
<html lang="vi" class="dark" translate="no">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>WedOS</title>

        <link rel="icon" href="/C/images/icons/couple.png" />

        <style id="wed-css" type="text/tailwindcss"></style>

        <script type="importmap">
            {
                "imports": {
                    "@tailwindcss/browser": "https://esm.sh/@tailwindcss/browser@4.2.2",
                    "ahooks": "https://esm.sh/ahooks@3.9.7?deps=react@19.2.4,react-dom@19.2.4",
                    "bro-fs": "https://esm.sh/bro-fs@0.6.0",
                    "clsx": "https://esm.sh/clsx@2.1.1",
                    "esbuild-wasm": "https://esm.sh/esbuild-wasm@0.28.0",
                    "js-yaml": "https://esm.sh/js-yaml@4.1.1",
                    "lodash-es": "https://esm.sh/lodash-es@4.17.22",
                    "motion/": "https://esm.sh/motion@12.38.0&deps=react@19.2.4,react-dom@19.2.4/",
                    "nanoid": "https://esm.sh/nanoid@5.1.7",
                    "react-dom": "https://esm.sh/react-dom@19.2.4",
                    "react-dom/": "https://esm.sh/react-dom@19.2.4/",
                    "react": "https://esm.sh/react@19.2.4",
                    "react/": "https://esm.sh/react@19.2.4/",
                    "tailwind-merge": "https://esm.sh/tailwind-merge@3.5.0",
                    "valtio": "https://esm.sh/valtio@2.3.1?deps=react@19.2.4,react-dom@19.2.4",
                    "zod": "https://esm.sh/zod@4.3.6"
                }
            }
        </script>
    </head>

    <body>
        <script type="module">
            import { buildCode } from './esbuild.js'

            const paths = ['/boot', '/paths']
            const texts = await Promise.all(
                paths.map((path) => {
                    return fetch(`${path}.ts`).then((res) => res.text())
                })
            )
            const result = await buildCode(
                paths[0],
                true,
                Object.fromEntries(texts.map((text, i) => [paths[i], text]))
            )
            const codeJs = result.outputFiles[0].text

            const script = document.createElement('script')
            script.type = 'module'
            script.text = codeJs
            document.head.appendChild(script)
        </script>

        <script id="wed-js" type="module"></script>
    </body>
</html>
